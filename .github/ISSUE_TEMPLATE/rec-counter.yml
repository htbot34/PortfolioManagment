name: Counter rec
description: Propose a modified version of a recommendation.
title: "Counter rec"
labels: ["rec-action"]
body:
  - type: markdown
    attributes:
      value: |
        Counter-propose a different action, size, or both. Logged to
        ``rec_history.yaml``. Repeated counters on the same ticker influence
        future sizing defaults.
  - type: input
    id: rec_id
    attributes:
      label: Rec ID
      placeholder: "ab12cd34"
    validations:
      required: true
  - type: dropdown
    id: counter_action
    attributes:
      label: Counter action
      description: What you'd do instead. Leave the rec's original action if you only want to change size.
      options:
        - buy
        - add
        - trim
        - sell
        - hold
        - watch
    validations:
      required: true
  - type: input
    id: counter_shares
    attributes:
      label: Counter shares
      description: Your preferred share count. Leave blank to defer to sizing default.
      placeholder: "e.g. 2"
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why your sizing or action is different from the recommendation.
    validations:
      required: true
