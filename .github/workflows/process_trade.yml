name: Process trade-log / chat issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'trade-log') || contains(github.event.issue.labels.*.name, 'chat')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install pyyaml

      - name: Apply
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -m app.portfolio.trade_log

      - name: Commit changes
        if: steps.apply.outputs.summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.yaml portfolio_history.yaml notes.yaml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Trade #${{ github.event.issue.number }}: ${{ steps.apply.outputs.summary }}"
            git push
          fi

      - name: Comment success and close
        if: steps.apply.outputs.summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUMMARY: ${{ steps.apply.outputs.summary }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "$(jq -n --arg b "Applied: $SUMMARY" '{body:$b}')"
          curl -sf -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            -d '{"state":"closed"}'

      - name: Comment failure
        if: steps.apply.outputs.error
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ERR: ${{ steps.apply.outputs.error }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "$(jq -n --arg b "Could not apply: $ERR. Edit the issue body and the bot will retry." '{body:$b}')"
