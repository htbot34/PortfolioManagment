name: Process trade-log / chat / rec-action / idea-action issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >
      contains(github.event.issue.labels.*.name, 'trade-log') ||
      contains(github.event.issue.labels.*.name, 'chat') ||
      contains(github.event.issue.labels.*.name, 'rec-action') ||
      contains(github.event.issue.labels.*.name, 'idea-action')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install pyyaml

      - name: Apply (rec-action)
        id: apply_rec
        continue-on-error: true
        if: contains(github.event.issue.labels.*.name, 'rec-action')
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -m app.portfolio.rec_action_handler

      - name: Apply (trade-log / chat)
        id: apply
        continue-on-error: true
        if: contains(github.event.issue.labels.*.name, 'trade-log') || contains(github.event.issue.labels.*.name, 'chat')
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -m app.portfolio.trade_log

      - name: Apply (idea-action)
        id: apply_idea
        continue-on-error: true
        if: contains(github.event.issue.labels.*.name, 'idea-action')
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -m app.portfolio.idea_action_handler

      - name: Commit changes
        if: steps.apply.outputs.summary || steps.apply_rec.outputs.summary || steps.apply_idea.outputs.summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.yaml portfolio_history.yaml notes.yaml rec_history.yaml idea_queue.yaml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          SUM="${{ steps.apply.outputs.summary || steps.apply_rec.outputs.summary || steps.apply_idea.outputs.summary }}"
          git commit -m "Issue #${{ github.event.issue.number }}: $SUM"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - rebasing on latest main..."
            git pull --rebase --autostash origin main || {
              echo "Rebase failed - aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            sleep $((attempt * 3))
          done
          echo "Push still failing after retries."
          exit 1

      - name: Comment success and close
        if: steps.apply.outputs.summary || steps.apply_rec.outputs.summary || steps.apply_idea.outputs.summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUMMARY: ${{ steps.apply.outputs.summary || steps.apply_rec.outputs.summary || steps.apply_idea.outputs.summary }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "$(jq -n --arg b "Applied: $SUMMARY" '{body:$b}')"
          curl -sf -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            -d '{"state":"closed"}'

      - name: Comment failure
        if: always() && (steps.apply.outputs.error || steps.apply_rec.outputs.error || steps.apply_idea.outputs.error)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ERR: ${{ steps.apply.outputs.error || steps.apply_rec.outputs.error || steps.apply_idea.outputs.error }}
        run: |
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "$(jq -n --arg b "Could not apply: $ERR. Edit the issue body and the bot will retry." '{body:$b}')"
