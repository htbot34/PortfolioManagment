name: Refresh portfolio site

on:
  schedule:
    # Weekdays at 11:00 UTC = 7am ET (EDT) / 6am ET (EST) - before market open
    - cron: "0 11 * * 1-5"
    # Weekdays at 22:00 UTC = 6pm ET (EDT) / 5pm ET (EST) - after market close,
    # so same-day close data feeds the next morning's technicals. The pipeline
    # is idempotent across same-day runs (rec_history dedupes on rec_id;
    # gate_telemetry, regime_history, and shadow_tracker are all date-keyed),
    # so a second run overwrites rather than double-counts.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "portfolio.yaml"
      - "risk_profile.yaml"
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write
  models: read

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        # Gate the suite on code changes only. Scheduled (cron) and manual
        # (workflow_dispatch) runs are data-only refreshes - skip the 427-test
        # gate so a daily refresh isn't blocked behind it. Pushes still run it.
        if: github.event_name == 'push'
        run: pytest -q

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL_ROUTINE: openai/gpt-4o-mini
          GITHUB_MODEL_SYNTHESIS: openai/gpt-4o
          LLM_MIN_GAP_S: "12"
          # SEC EDGAR requires a real, monitored contact in the User-Agent.
          # The SEC_USER_AGENT repo secret overrides this when set; the
          # fallback below is a real deliverable contact so the insider
          # signal works without extra setup. To keep the address out of
          # public git history, set it as a repo secret instead:
          # Settings > Secrets and variables > Actions > New repository secret.
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'PortfolioAdvisor henrylachtur@gmail.com' }}
        run: python -m app.build_site

      - name: Notify on new recommendations
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_URL: https://htbot34.github.io/PortfolioManagment/
        run: |
          if [ ! -s .new_recs.json ] || [ "$(jq 'length' .new_recs.json)" = "0" ]; then
            echo "No new recs to notify."
            exit 0
          fi
          count=$(jq 'length' .new_recs.json)
          echo "Opening $count issue(s) for new rec(s)..."
          for i in $(seq 0 $((count - 1))); do
            rec=$(jq ".[$i]" .new_recs.json)
            ticker=$(echo "$rec" | jq -r '.ticker // "?"')
            action=$(echo "$rec" | jq -r '.action // "?"' | tr '[:lower:]' '[:upper:]')
            slot=$(echo "$rec"  | jq -r '._slot // "primary"')
            rec_id=$(echo "$rec" | jq -r '.rec_id // ""')
            title="[REC] $action $ticker -- $slot"
            body_file=$(mktemp)
            {
              echo "**Action**: $action $ticker"
              echo
              size_display=$(echo "$rec" | jq -r '.size.display // ""')
              [ -n "$size_display" ] && echo "**Size**: $size_display" && echo
              entry=$(echo "$rec" | jq -r '.entry // ""')
              [ -n "$entry" ] && echo "**Entry**: $entry"
              stop=$(echo "$rec" | jq -r '.stop // ""')
              [ -n "$stop" ] && echo "**Stop**: $stop"
              target=$(echo "$rec" | jq -r '.target // ""')
              [ -n "$target" ] && echo "**Target**: $target"
              conviction=$(echo "$rec" | jq -r '.conviction // ""')
              [ -n "$conviction" ] && echo "**Conviction**: $conviction/5"
              thesis=$(echo "$rec" | jq -r '.thesis // ""')
              if [ -n "$thesis" ]; then echo; echo "**Thesis**: $thesis"; fi
              invalidation=$(echo "$rec" | jq -r '.invalidation // ""')
              [ -n "$invalidation" ] && echo "**Invalidation**: $invalidation"
              evidence=$(echo "$rec" | jq -r '.evidence // [] | if type=="array" then map("- " + .) | join("\n") else "" end')
              if [ -n "$evidence" ]; then echo; echo "**Evidence**:"; echo "$evidence"; fi
              echo
              echo "[Dashboard]($DASHBOARD_URL) · [Recommendations](${DASHBOARD_URL}recommendations.html) · [data.json](${DASHBOARD_URL}data.json)"
              echo
              echo "_rec_id: \`$rec_id\`_"
            } > "$body_file"
            # Retry without the label if it hasn't been provisioned yet by
            # sync_labels.yml -- gh refuses to create the issue at all when a
            # passed label is missing, so the fallback ensures we still notify.
            gh issue create --title "$title" --body-file "$body_file" --label recommendation \
              || gh issue create --title "$title" --body-file "$body_file" \
              || echo "Failed to create issue for $ticker; continuing."
          done

      - name: Commit built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage each path on its own: `git add a b c` is atomic, so a single
          # missing pathspec (e.g. gate_telemetry.yaml / form4_cache.json, which
          # are only written when their data paths succeed) makes the whole add
          # a no-op and silently discards the rebuilt site.
          for path in index.html positions.html scanner.html recommendations.html candidates.html data.json ticker .nojekyll price_cache.json rec_history.yaml idea_queue.yaml intraday_alerts.json news_classification_cache.json regime_history.json fundamentals_cache.json gate_telemetry.yaml form4_cache.json ticker_cik_cache.json shadow_ledger.yaml shadow_calibration.yaml portfolio.yaml; do
            git add "$path" 2>/dev/null || true
          done
          if git diff --staged --quiet; then
            echo "No site changes."
            exit 0
          fi
          git commit -m "Refresh site $(date -u +%Y-%m-%dT%H:%MZ)"
          # The build takes several minutes; other workflows (intraday,
          # process_trade) may push to main meanwhile. Rebase and retry so a
          # concurrent push does not silently discard the rebuilt site.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - rebasing on latest main..."
            git pull --rebase --autostash origin main || {
              echo "Rebase failed - aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            sleep $((attempt * 3))
          done
          echo "Push still failing after retries."
          exit 1
