name: Refresh portfolio site

on:
  schedule:
    # Weekdays at 11:00 UTC = 7am ET (EDT) / 6am ET (EST) - before market open
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "portfolio.yaml"
      - "risk_profile.yaml"
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write
  models: read

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL_ROUTINE: openai/gpt-4o-mini
          GITHUB_MODEL_SYNTHESIS: openai/gpt-4o
          LLM_MIN_GAP_S: "12"
          SEC_USER_AGENT: PortfolioAdvisor ${{ github.repository_owner }}@users.noreply.github.com
        run: python -m app.build_site

      - name: Commit built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html positions.html scanner.html recommendations.html candidates.html data.json ticker .nojekyll price_cache.json rec_history.yaml idea_queue.yaml intraday_alerts.json news_classification_cache.json regime_history.json fundamentals_cache.json gate_telemetry.yaml form4_cache.json portfolio.yaml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No site changes."
            exit 0
          fi
          git commit -m "Refresh site $(date -u +%Y-%m-%dT%H:%MZ)"
          # The build takes several minutes; other workflows (intraday,
          # process_trade) may push to main meanwhile. Rebase and retry so a
          # concurrent push does not silently discard the rebuilt site.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - rebasing on latest main..."
            git pull --rebase --autostash origin main || {
              echo "Rebase failed - aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            sleep $((attempt * 3))
          done
          echo "Push still failing after retries."
          exit 1
