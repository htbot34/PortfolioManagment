name: Refresh portfolio site

on:
  schedule:
    # Every weekday at 22:00 UTC (~5pm ET, after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "portfolio.yaml"
      - "risk_profile.yaml"
      - "app/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write
  models: read

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o-mini
          SEC_USER_AGENT: PortfolioAdvisor ${{ github.repository_owner }}@users.noreply.github.com
        run: python -m app.build_site

      - name: Commit built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No site changes."
          else
            git commit -m "Refresh site $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
